name: Deploy To Oracle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build runnable jar
        run: mvn -B package

      - name: Copy jar to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: target/masqueroll.jar
          target: /home/${{ secrets.ORACLE_USER }}/masqueroll/
          strip_components: 1

      - name: Restart bot service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.ORACLE_USER }}/masqueroll
            cat > /home/${{ secrets.ORACLE_USER }}/masqueroll/.env <<EOF
            DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
            EOF
            if [ ! -s /home/${{ secrets.ORACLE_USER }}/masqueroll/.env ]; then
              echo ".env file could not be created."
              exit 1
            fi
            APP_CMD="/usr/bin/java -jar /home/${{ secrets.ORACLE_USER }}/masqueroll/masqueroll.jar"
            EXISTING_PIDS=$(pgrep -f "^${APP_CMD}$" || true)
            if [ -n "$EXISTING_PIDS" ]; then
              kill $EXISTING_PIDS || true
              sleep 2
            fi
            nohup /usr/bin/java -jar /home/${{ secrets.ORACLE_USER }}/masqueroll/masqueroll.jar \
              > /home/${{ secrets.ORACLE_USER }}/masqueroll/bot.log 2>&1 < /dev/null &
            disown || true
            sleep 5
            pgrep -f "^${APP_CMD}$"
