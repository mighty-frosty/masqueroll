name: Deploy To Oracle

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: masqueroll:${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: docker build -t "${IMAGE_NAME}" .

      - name: Export container image
        run: docker save "${IMAGE_NAME}" -o masqueroll-image.tar

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/oracle_vm <<EOF
          ${{ secrets.ORACLE_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/oracle_vm

      - name: Copy image tarball to Oracle VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          scp -i ~/.ssh/oracle_vm -o StrictHostKeyChecking=no masqueroll-image.tar "$ORACLE_USER@$ORACLE_HOST:/tmp/masqueroll-image.tar"

      - name: Deploy container on Oracle VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          SSH_OPTS="-i ~/.ssh/oracle_vm -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            if ssh $SSH_OPTS "$ORACLE_USER@$ORACLE_HOST" \
              "DISCORD_BOT_TOKEN='$DISCORD_BOT_TOKEN' IMAGE_NAME='$IMAGE_NAME' bash -s" <<'EOF'
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not found on VM. Installing Docker..."
            sudo apt update
            sudo apt install -y docker.io
            sudo systemctl enable --now docker
          fi
          if [ ! -f /tmp/masqueroll-image.tar ]; then
            echo "Image tarball not found on VM."
            exit 1
          fi
          if [ -z "$DISCORD_BOT_TOKEN" ]; then
            echo "DISCORD_BOT_TOKEN is empty."
            exit 1
          fi
          docker load -i /tmp/masqueroll-image.tar
          docker rm -f masqueroll || true
          docker run -d \
            --name masqueroll \
            --restart unless-stopped \
            -e DISCORD_BOT_TOKEN="$DISCORD_BOT_TOKEN" \
            "$IMAGE_NAME"
          docker ps --filter name=masqueroll
          EOF
            then
              exit 0
            fi
            echo "Deploy attempt $attempt failed."
            if [ "$attempt" -lt 3 ]; then
              sleep 15
            fi
          done
          echo "Deployment failed after 3 attempts."
          exit 1
