name: Deploy To Oracle

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/masqueroll

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/oracle_vm <<EOF
          ${{ secrets.ORACLE_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/oracle_vm

      - name: Deploy container on Oracle VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          SSH_OPTS="-i ~/.ssh/oracle_vm -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            if ssh $SSH_OPTS "$ORACLE_USER@$ORACLE_HOST" \
              "GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' DISCORD_BOT_TOKEN='$DISCORD_BOT_TOKEN' IMAGE_NAME='$IMAGE_NAME' bash -s" <<'EOF'
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not found on VM. Installing Docker..."
            sudo apt update
            sudo apt install -y docker.io
            sudo systemctl enable --now docker
          fi
          if [ -z "$GHCR_USERNAME" ]; then
            echo "GHCR_USERNAME is empty."
            exit 1
          fi
          if [ -z "$GHCR_TOKEN" ]; then
            echo "GHCR_TOKEN is empty."
            exit 1
          fi
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker pull "$IMAGE_NAME:latest"
          docker rm -f masqueroll || true
          docker run -d \
            --name masqueroll \
            --restart unless-stopped \
            -e DISCORD_BOT_TOKEN="$DISCORD_BOT_TOKEN" \
            "$IMAGE_NAME:latest"
          docker ps --filter name=masqueroll
          EOF
            then
              exit 0
            fi
            echo "Deploy attempt $attempt failed."
            if [ "$attempt" -lt 3 ]; then
              sleep 15
            fi
          done
          echo "Deployment failed after 3 attempts."
          exit 1
